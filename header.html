<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://remote-opus.com/wp-content/uploads/2025/01/cropped-DByy2b1.png">
<title>Remote Opus - Header</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  /* Reset the gap above the header */
  html, body {
    margin: 0;
    padding: 0;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #C8E0D4;
    padding: 0 2%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
  }

  .nav-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: #1A4731;
    text-decoration: none;
    letter-spacing: -0.02em;
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    align-items: center;
    margin: 0;
    padding: 0;
  }

  .nav-links a {
    text-decoration: none;
    color: #6B8F7A;
    font-size: 0.88rem;
    font-weight: 500;
    transition: color 0.2s;
  }

  .nav-links a:hover {
    color: #1A4731;
  }

  .nav-links a.active {
    color: #2E7D52;
    font-weight: 600;
  }

  .nav-links li {
    position: relative;
  }

  /* Invisible bridge across the 12px gap between trigger and dropdown,
     so :hover stays active while the cursor moves down to the menu. */
  .nav-links li.has-dropdown::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    height: 14px;
  }

  .nav-links li .dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 12px);
    left: 50%;
    transform: translateX(-50%);
    background: #FFFFFF;
    border: 1px solid #C8E0D4;
    border-radius: 12px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
    min-width: 200px;
    padding: 0.5rem 0;
    z-index: 200;
    white-space: nowrap;
  }

  .nav-links li:hover .dropdown,
  .nav-links li.open .dropdown {
    display: block;
  }

  .nav-links li .dropdown a {
    display: block;
    padding: 0.65rem 1.2rem;
    color: #0F2318;
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.15s;
  }

  .nav-links li .dropdown a:hover {
    background: #E8F5EE;
    color: #1A4731;
  }

  .nav-links li.has-dropdown > a::after {
    content: ' \25BE';
    font-size: 0.7rem;
    opacity: 0.6;
  }

  .nav-cta {
    background: #1A4731;
    color: #FFFFFF !important;
    padding: 0.55rem 1.4rem;
    border-radius: 50px;
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    transition: all 0.2s;
  }

  .nav-cta:hover {
    background: #2E7D52;
    transform: translateY(-1px);
  }

  /* Push page content below the fixed nav */
  body {
    padding-top: 68px;
  }

  /* ── HAMBURGER ── */
  .menu-toggle {
    display: none;
  }

  .hamburger {
    display: none;
    cursor: pointer;
    padding: 4px;
    margin-left: auto;
    align-items: center;
    justify-content: center;
  }

  /* ── NAV MEDIA QUERIES ── */
  @media (max-width: 768px) {
    nav {
      height: 68px !important;
      padding: 0 6% !important;
      flex-wrap: nowrap !important;
      align-items: center !important;
      justify-content: space-between !important;
    }

    .nav-cta {
      display: none !important;
    }

    .hamburger {
      display: flex !important;
    }

    .nav-links {
      display: none !important;
      flex-direction: column;
      position: fixed;
      top: 68px;
      left: 0;
      right: 0;
      transform: none;
      background: rgba(255, 255, 255, 0.98);
      padding: 2rem 6%;
      border-bottom: 1px solid #C8E0D4;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
      gap: 1.5rem;
      text-align: center;
      z-index: 9998;
    }

    .menu-toggle:checked ~ .nav-links {
      display: flex !important;
    }

    .nav-links li .dropdown {
      position: static !important;
      transform: none !important;
      box-shadow: none !important;
      border: none !important;
      background: transparent !important;
      padding: 0 !important;
      display: none !important;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease, padding 0.25s ease;
    }

    .nav-links li.has-dropdown.open .dropdown {
      display: block !important;
      max-height: 400px;
      padding: 0.5rem 0 0 0 !important;
    }

    .nav-links li .dropdown a {
      padding: 0.65rem !important;
      background: #E8F5EE !important;
      border-radius: 8px !important;
      margin-bottom: 0.5rem !important;
    }

    .nav-links li.has-dropdown > a::after {
      content: ' \25BE' !important;
      display: inline-block !important;
      margin-left: 0.4rem;
      font-size: 0.75rem;
      opacity: 0.6;
      transition: transform 0.2s ease;
    }
    .nav-links li.has-dropdown.open > a::after {
      transform: rotate(180deg);
    }

    /* Disable the desktop hover-bridge on mobile (would overlap the next item) */
    .nav-links li.has-dropdown::after {
      display: none !important;
    }
  }

  @media (max-width: 480px) {
    .nav-logo {
      font-size: 1.2rem;
    }

    .nav-cta {
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
    }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="https://remote-opus.com/home-page/">Remote Opus</a>
  <input type="checkbox" id="mobile-menu-toggle" class="menu-toggle">
  <label for="mobile-menu-toggle" class="hamburger">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1A4731" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </label>
  <ul class="nav-links">
    <li class="has-dropdown">
      <a href="#">Voor wie</a>
      <div class="dropdown">
        <a href="https://remote-opus.com/e-commerce-page/">E-commerce bedrijven</a>
        <a href="https://remote-opus.com/agencies/">Agencies &amp; Bureaus</a>
      </div>
    </li>
    <li><a href="https://remote-opus.com/tarieven-page/">Tarieven</a></li>
    <li><a href="https://remote-opus.com/succes/">Succes verhalen</a></li>
    <li><a href="https://remote-opus.com/office/">Onze kantoren</a></li>
    <li><a href="https://remote-opus.com/over-ons-2/">Over ons</a></li>
    <li><a href="https://remote-opus.com/contact-page/">Contact</a></li>
  </ul>
  <a href="https://remote-opus.com/kennismaking/" class="nav-cta">Plan een gesprek</a>
</nav>

<script>
  // Mobile: click-to-toggle the "Voor wie" dropdown.
  // Uses event delegation so it works even if the nav HTML loads after this script.
  (function () {
    function isMobile() { return window.matchMedia('(max-width: 768px)').matches; }

    document.addEventListener('click', function (e) {
      var trigger = e.target.closest('.nav-links li.has-dropdown > a');
      if (!trigger) return;
      if (!isMobile()) return;
      e.preventDefault();
      var li = trigger.parentElement;
      // Close other open dropdowns at the same level
      li.parentElement.querySelectorAll('li.has-dropdown.open').forEach(function (other) {
        if (other !== li) other.classList.remove('open');
      });
      li.classList.toggle('open');
    });

    // Reset open state when leaving mobile breakpoint, so desktop hover stays clean
    window.addEventListener('resize', function () {
      if (!isMobile()) {
        document.querySelectorAll('.nav-links li.has-dropdown.open').forEach(function (li) {
          li.classList.remove('open');
        });
      }
    });
  })();
</script>

</body>
</html>
